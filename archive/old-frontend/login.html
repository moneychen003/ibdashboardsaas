<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - IB 投资组合</title>
    <style>
        :root {
            --black: #000000;
            --gray: #666666;
            --light-gray: #e5e5e5;
            --lighter-gray: #f5f5f5;
            --white: #ffffff;
            --danger: #ff3d00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--lighter-gray);
            color: var(--black);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 24px;
        }
        .login-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: 16px;
            padding: 40px;
            width: 100%; max-width: 380px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .login-title {
            font-size: 22px; font-weight: 600; margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 14px; color: var(--gray); margin-bottom: 28px;
        }
        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px;
        }
        .form-input {
            width: 100%; padding: 12px 14px; font-size: 15px;
            border: 1px solid var(--light-gray); border-radius: 10px;
            outline: none; transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--black); }
        .login-btn {
            width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
            background: var(--black); color: var(--white); border: none;
            border-radius: 10px; cursor: pointer; transition: opacity 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover { opacity: 0.85; }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg {
            margin-top: 14px; font-size: 13px; color: var(--danger);
            min-height: 18px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">欢迎回来</div>
        <div class="login-subtitle">登录以查看投资组合</div>
        <div class="form-group">
            <label class="form-label">用户名</label>
            <input type="text" id="username" class="form-input" placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" id="password" class="form-input" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button class="login-btn" id="loginBtn" onclick="doLogin()">登录</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <script>
        async function doLogin() {
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            err.textContent = '';
            if (!username || !password) {
                err.textContent = '请输入用户名和密码';
                return;
            }
            btn.disabled = true;
            btn.textContent = '登录中...';
            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await resp.json();
                if (resp.ok && data.success) {
                    window.location.href = '/';
                } else {
                    err.textContent = data.error || '登录失败';
                }
            } catch (e) {
                err.textContent = '网络错误，请稍后重试';
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
